<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maidang 指令助手</title>
    <style>
        @font-face {
            font-family: 'MinecraftFont';
            /* 这是你给字体起的名字 */
            src: url('fonts/minecraft_fort.ttf') format('truetype');
            /* 确保路径正确 */
            font-weight: normal;
            font-style: normal;
        }


        /* 2. 定义图标字体 */
        @font-face {
            font-family: 'Material Symbols Outlined';
            src: url('fonts/material-symbols-outlined.woff2') format('woff2');
        }

        body {
            font-family: var(--main-font);
        }

        /* 确保输入框和按钮也继承字体 */
        input,
        button,
        textarea,
        .suggestion-item {
            font-family: inherit;
        }

        :root {
            --main-font: 'MinecraftFont', 'Roboto', sans-serif;

            /* M3 官方配色方案 */
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005D;
            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-on-surface: #1D1B20;
            --md-sys-color-surface-container: #F3EDF7;
            --md-sys-color-surface-container-high: #ECE6F0;
            --md-sys-color-surface-container-highest: #E6E0E9;
            --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-outline: #79747E;
            --md-sys-color-error: #B3261E;

            /* Elevation 阴影 */
            --md-sys-elevation-1: 0px 1px 3px 1px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3);
            --md-sys-elevation-2: 0px 2px 6px 2px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3);
        }

        body {
            margin: 0;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 16px 24px;
            font-size: 1.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--md-sys-color-primary);
        }

        #main-content {
            flex: 1;
            padding: 0 24px 140px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-card {
            width: 100%;
            max-width: 900px;
            background-color: var(--md-sys-color-surface-container);
            border-radius: 28px;
            padding: 28px;
            box-sizing: border-box;
            margin-bottom: 24px;
            transition: box-shadow 0.3s ease;
            box-shadow: var(--md-sys-elevation-1);
        }

        .label-small {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1px;
            color: var(--md-sys-color-primary);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
        }

        .syntax-display {
            font-size: 1.2rem;
            line-height: 1.6;
            color: var(--md-sys-color-on-surface);
        }

        .syntax-active {
            color: var(--md-sys-color-on-primary-container);
            background-color: var(--md-sys-color-primary-container);
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 700;
        }

        .syntax-dim {
            opacity: 0.38;
        }

        .status-analysis {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--md-sys-color-outline);
            opacity: 0.9;
        }

        .status-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--md-sys-color-on-surface-variant);
            margin-bottom: 8px;
        }

        .suggestion-list {
            width: 100%;
            max-width: 900px;
            display: grid;
            gap: 12px;
            padding-bottom: 100px;
        }

        .suggestion-item {
            position: relative;
            overflow: hidden;
            background-color: var(--md-sys-color-surface-container-high);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid transparent;
        }

        .suggestion-item:hover {
            background-color: var(--md-sys-color-surface-container-highest);
        }

        .suggestion-item.selected {
            background-color: var(--md-sys-color-primary-container);
            border-color: var(--md-sys-color-primary);
        }

        .particle-container {
            position: absolute;
            left: 200px;
            /* 从左开始 */
            top: 0;
            width: 100%;
            /* 覆盖全宽 */
            height: 100%;
            pointer-events: none;
            z-index: 0;
            /* 放在文字底层 */
            overflow: hidden;
        }

        .suggest-icon {
            position: relative;
            z-index: 2;
        }

        /* 建议项文本样式 */
        .suggest-main {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .suggest-text {
            font-weight: 500;
        }

        /* 描述文字样式 */
        .suggestion-description {
            font-size: 0.8rem;
            color: var(--md-sys-color-outline);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            /*max-width: 250px;  限制描述长度 */
        }

        .suggest-alias {
            font-size: 0.7rem;
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 8px;
            border-radius: 6px;
            color: var(--md-sys-color-primary);
            white-space: nowrap;
        }

        .bottom-nav {
            padding: 80px 24px 10px 24px;
            display: flex;
            align-items: center;
            background: linear-gradient(transparent, var(--md-sys-color-surface) 40%);
            position: fixed;
            bottom: 0;
            width: 100%;
            box-sizing: border-box;
            flex-direction: column;
            /* 强制让搜索框在上面，文字在下面 */
            gap: 8px;
            /* 搜索框和文字之间的间距 */
        }

        .search-bar {
            display: flex;
            align-items: center;
            background-color: var(--md-sys-color-surface-container-highest);
            width: 100%;
            max-width: 720px;
            height: 64px;
            border-radius: 32px;
            padding: 0 12px 0 24px;
            box-shadow: var(--md-sys-elevation-2);
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 1.1rem;
            color: var(--md-sys-color-on-surface);
        }

        .copy-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--md-sys-color-primary);
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.2s;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--md-sys-color-outline);
            border-radius: 10px;
            border: 2px solid var(--md-sys-color-surface);
        }

        .suggestion-item {
            display: flex !important;
            flex-direction: row !important;
            align-items: center !important;
            padding: 8px 12px;
        }

        .suggest-icon {
            width: 28px !important;
            height: 28px !important;
            margin-right: 12px;
            flex-shrink: 0;
            image-rendering: pixelated;
            /* 像素抗锯齿 */
            background-color: rgba(255, 255, 255, 0.05);
            /* 辅助观察 */
        }

        .suggest-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            /* 防止文字溢出挤压图片 */
        }

        /* 粒子基础样式修改 */
        .particle {
            position: absolute;
            bottom: 5px;
            width: 25px;
            /* 稍微大一点，根据你的图片尺寸调整 */
            height: 25px;
            background-size: contain;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            /* 关键：保持像素清晰 */
            opacity: 0;
            pointer-events: none;
            animation: mc-particle-float 2.5s infinite linear;
        }

        /* 粒子漂浮动画：模仿 MC 的随机感 */
        @keyframes mc-particle-float {
            0% {
                transform: translate(0, 20px) scale(0.8);
                opacity: 0;
            }

            20% {
                opacity: 0.6;
            }

            80% {
                opacity: 0.6;
            }

            100% {
                /* 让它往左上方斜着飘一点 */
                transform: translate(-10px, -20px) scale(1.1);
                opacity: 0;
            }
        }

        /* 随机分布位置和延迟 */
        .p1 {
            right: 5px;
            bottom: 0;
            animation-delay: 0s;
        }

        .p2 {
            right: 20px;
            bottom: -5px;
            animation-delay: 0.8s;
        }

        .p3 {
            right: 35px;
            bottom: 5px;
            animation-delay: 1.6s;
        }

        /* 实体方块的基础样式 */
        .suggestion-item.entity-item {
            flex-direction: column !important;
            /* 强制图片在上，文字在下 */
            align-items: center !important;
            /* 水平居中 */
            justify-content: center !important;
            /* 垂直居中 */
            padding: 15px 10px !important;
            height: auto !important;
            /* 让高度根据内容撑开 */
            min-height: 130px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            /* 浅色背景 */
        }

        /* 修复图片压扁 */
        .entity-icon {
            width: 64px !important;
            /* 固定宽度 */
            height: 64px !important;
            /* 固定高度 */
            object-fit: contain;
            /* 保持比例，不拉伸 */
            image-rendering: pixelated;
            /* 保持像素清晰 */
            margin-bottom: 8px;
            /* 和文字留点距离 */
        }

        /* 文字微调 */
        .entity-item .suggest-main {
            text-align: center;
            margin: 0 !important;
        }

        .entity-item .suggest-text {
            font-size: 13px;
            display: block;
            word-break: break-all;
            /* 防止超长英文撑破方块 */
        }

        .entity-item .suggestion-description {
            font-size: 12px;
            opacity: 0.6;
        }

        /* 默认状态：普通列表布局 */
        #suggestion-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
        }

        /* 激活状态：只有当盒子带有 .is-grid 类时才启用网格 */
        #suggestion-box.is-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }

        .sound-btn-container {
            display: flex;
            flex-wrap: wrap;
            /* 允许换行 */
            gap: 5px;
            /* 按钮之间的间距 */
            max-width: 490px;
            /* 关键：限制容器的最大宽度 */
            /* 假设每个按钮宽度约 28px + 间距 4px = 32px */
            /* 32px * 10个 = 320px。这样超过10个就会自动挤到下一行 */

            justify-content: flex-start;
            /* 左对齐 */
            margin-left: 10px;
            /* 与文字保持距离 */
        }

        .sound-play-btn {
            width: 32px;
            background: rgba(var(--md-sys-color-primary-rgb), 0.1);
            border-radius: 50%;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--md-sys-color-primary);
            width: 28px;
            /* 固定按钮宽度 */
            height: 28px;
            display: flex;
            align-items: center;
        }

        .sound-play-btn:hover {
            background: var(--md-sys-color-primary);
            color: white;
            transform: scale(1.1);
        }

        .sound-play-btn .material-icons {
            font-family: 'Material Symbols Outlined';
            src: url('fonts/material-symbols-outlined.woff2') format('woff2');
        }

        /* 4. 强制图标类：必须使用图标字体，覆盖掉 body 的设置 */
        .material-symbols-outlined {
            /* 核心修复：添加 !important 确保不被 body 字体覆盖 */
            font-family: 'Material Symbols Outlined' !important;
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
        }

        .credits {
            font-size: 12px;
            /* 字体小一点，显得低调 */
            color: var(--md-sys-color-on-surface-variant);
            /* 使用你主题里的次要文字颜色 */
            opacity: 0.7;
            /* 增加透明度 */
            margin-top: 8px;
            /* 与输入框保持一点间距 */
            margin-left: 4px;
            /* 与输入框左对齐 */
            text-align: left;
            /* 左对齐 */
            font-family: 'MinecraftFont', sans-serif;
            /* 保持像素风 */
        }

        /* 如果你希望在移动端居中显示 */
        @media (max-width: 600px) {
            .credits {
                text-align: center;
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <header>
        <span class="material-symbols-outlined">terminal</span>
        我的世界指令助手
    </header>

    <div id="main-content">
        <div id="display-card" class="info-card">
            <span id="card-label" class="label-small">Status</span>
            <div id="syntax-box" class="syntax-display">/</div>

            <div id="status-area" class="status-analysis" style="display: none;">
                <div class="status-title">
                    <span class="material-symbols-outlined" style="font-size: 18px;">analytics</span>
                    逻辑分析
                </div>
                <div id="error-box"></div>
            </div>
        </div>
        <div id="suggestion-box" class="suggestion-list"></div>
    </div>

    <div class="bottom-nav">
        <div class="search-bar">
            <input type="text" id="search-input" class="search-input" placeholder="请输入指令ing" autocomplete="off">
            <div class="copy-icon" onclick="copyInputContent()" title="复制到剪贴板">
                <span class="material-symbols-outlined">content_copy</span>
            </div>
        </div>
        <div class="credits">
            感谢原作者 ProjectXero 和南鸢晨星的数据支持
        </div>
    </div>


    <script>
        let currentSuggestions = [];
        let selectedIndex = -1;
        let mcData = null;
        const input = document.getElementById('search-input');
        const syntaxBox = document.getElementById('syntax-box');
        const suggestBox = document.getElementById('suggestion-box');
        const statusArea = document.getElementById('status-area');
        const cardLabel = document.getElementById('card-label');

        async function loadData() {
            try {
                // 加载命令库
                const response = await fetch('data.json');
                mcData = await response.json();

                // 加载声音库
                const soundRes = await fetch('minecraft_sound/sound_definitions.json');
                const soundJson = await soundRes.json();

                // 关键点 A：确保指向 sound_definitions 这一层
                soundData = soundJson.sound_definitions || soundJson;

                console.log("声音库加载成功");

                // 关键点 B：数据加载完后，手动触发一次输入框的 input 事件
                // 这样刷新页面后自动填充的内容就会重新进行一次声音匹配
                const input = document.getElementById('command-input'); // 请确保你的 input ID 正确
                if (input) {
                    input.dispatchEvent(new Event('input'));
                }

                if (typeof init === 'function') init();
            } catch (e) {
                console.error("加载失败:", e);
                if (typeof syntaxBox !== 'undefined') {
                    syntaxBox.innerHTML = "<span style='color:var(--md-sys-color-error)'>数据加载失败。</span>";
                }
            }
        }


        function init() {
            cardLabel.innerText = "匹配指令建议";
            syntaxBox.innerHTML = "正在检索...";
            statusArea.style.display = 'none';
            // --- 新增：从缓存恢复内容 ---
            const savedValue = localStorage.getItem('mc_cmd_cache');
            if (savedValue) {
                input.value = savedValue;
                // 延迟一小会儿触发 input，确保数据已加载
                setTimeout(() => {
                    input.dispatchEvent(new Event('input'));
                }, 100);
            }
            // -----------------------
            if (mcData) {
                renderSuggestions(Object.keys(mcData.commands), true);
            }
        }

        function updateSuggestionUI() {
            if (currentSuggestions.length === 0) {
                suggestBox.innerHTML = '<div style="padding:16px; opacity:0.5; grid-column: 1/-1; text-align:center;">(无匹配项)</div>';
                return;
            }

            // 处理 Grid 布局切换
            const box = document.getElementById('suggestion-box');
            const hasEntity = currentSuggestions.some(s => s.listType === 'entity');
            box.classList.toggle('is-grid', hasEntity);

            suggestBox.innerHTML = currentSuggestions.map((item, idx) => {
                const isSelected = idx === selectedIndex;
                const activeClass = isSelected ? 'selected' : '';

                // 1. 提取基础信息
                const text = typeof item === 'object' ? item.text : item;
                const listType = typeof item === 'object' ? item.listType : '';
                const desc = typeof item === 'object' ? item.desc : (mcData.commands[text]?.description || "");

                // 2. 初始化渲染变量
                let imgHtml = '';
                let effectClass = '';    // 判定是否为药水效果
                let particleHtml = '';   // 粒子动画或播放按钮容器
                let buttonsHtml = '';
                let isEntity = (listType === 'entity');

                // --- 核心修复：声音匹配逻辑 ---
                if (listType === 'sound') {
                    // 确保使用全局加载的 soundData
                    // 自动兼容数据层级
                    const library = soundData.sound_definitions || soundData;
                    const targetKey = text.trim();

                    // 尝试匹配
                    let definition = library[targetKey];
                    if (!definition && targetKey.includes(':')) {
                        definition = library[targetKey.split(':')[1]];
                    }

                    if (definition && definition.sounds) {
                        // 提取声音路径
                        const soundList = definition.sounds.map(s => typeof s === 'string' ? s : s.name);

                        // 生成按钮 HTML
                        buttonsHtml = soundList.map((path, index) => {
                            const fullPath = `minecraft_sound/${path}.ogg`;
                            return `
                <div class="sound-play-btn" onclick="playSound('${fullPath}', event)" title="播放变体 ${index + 1}">
                    <span class="material-icons">play_arrow</span>
                </div>`;
                        }).join('');

                        // 将按钮放入容器
                        particleHtml = `<div class="sound-btn-container">${buttonsHtml}</div>`;
                    }
                }

                // --- 实体图标逻辑 ---
                if (isEntity) {
                    effectClass = 'entity-item';
                    const fileName = text.includes(':') ? text.split(':')[1] : text;
                    const basePath = `minecraft_mob/${fileName}`;
                    imgHtml = `<img src="${basePath}.gif" class="entity-icon" onerror="this.onerror=null; this.src='${basePath}.png';">`;
                }

                // --- 药水效果逻辑 ---
                else if (listType === 'effect') {
                    effectClass = 'effect-item';
                    const fileName = text.includes(':') ? text.split(':')[1] : text;
                    let particles = '';
                    for (let i = 0; i < 10; i++) {
                        particles += `<div class="particle" style="
                    background-image: url('minecraft_effects/particle_${fileName}.png');
                    left: ${Math.random() * 95}%;
                    animation-delay: ${Math.random() * 2}s;
                    animation-duration: ${2 + Math.random() * 2}s;
                "></div>`;
                    }
                    particleHtml = `<div class="particle-container">${particles}</div>`;
                    imgHtml = `<img src="minecraft_effects/${fileName}.png" class="suggest-icon" onerror="this.style.display='none'">`;
                }

                // --- 物品/方块图标逻辑 ---
                else if (listType === 'block' || listType === 'item') {
                    const fileName = text.includes(':') ? text.split(':')[1] : text;
                    imgHtml = `<img src="minecraft_items/${fileName}.png" class="suggest-icon" onerror="this.style.display='none'">`;
                }

                // 3. 返回最终生成的 HTML
                return `
            <div class="suggestion-item ${activeClass} ${effectClass}" 
                 onclick="applySuggest('${text}', ${cardLabel.innerText.includes('指令')})">
                ${imgHtml}
                <div class="suggest-main">
                    <span class="suggest-text">${text}</span>
                    ${desc ? `<span class="suggestion-description">${desc}</span>` : ''}
                </div>
                ${particleHtml}
                ${(isSelected && !isEntity) ? '<span class="suggest-alias">TAB 确认</span>' : ''}
            </div>
        `;
            }).join('');

            // 自动滚动到选中项
            if (selectedIndex !== -1) {
                const activeItem = suggestBox.children[selectedIndex];
                if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }
        }

        input.addEventListener('keydown', (e) => {
            const listLength = currentSuggestions.length;
            if (e.key === 'Tab' || e.key === 'ArrowDown') {
                e.preventDefault();
                if (listLength > 0) {
                    selectedIndex = (selectedIndex + 1) % listLength;
                    updateSuggestionUI();
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (listLength > 0) {
                    selectedIndex = (selectedIndex - 1 + listLength) % listLength;
                    updateSuggestionUI();
                }
            } else if ((e.key === ' ' || e.key === 'Enter') && selectedIndex !== -1) {
                e.preventDefault();
                const item = currentSuggestions[selectedIndex];
                const text = typeof item === 'object' ? item.text : item;
                applySuggest(text, cardLabel.innerText.includes('指令'));
                selectedIndex = -1;
            }
        });

        input.addEventListener('input', () => {
            const raw = input.value;
            localStorage.setItem('mc_cmd_cache', raw);
            if (!raw.trim()) { init(); return; }
            // 在 input 事件监听器内部
            // 在 input 监听器最后一行改为：
            const clean = raw.trim().startsWith('/') ? raw.trim().substring(1) : raw.trim();
            const parts = clean.split(/\s+/);
            const inputCmd = parts[0].toLowerCase();
            const args = parts.slice(1);
            const endsWithSpace = raw.endsWith(' ');

            // --- 2. 现在可以安全地定义 currentArgText 了 ---
            const currentArgText = endsWithSpace ? "" : parts[parts.length - 1].toLowerCase();

            // --- 3. 后续逻辑保持不变 ---
            const allCmdKeys = Object.keys(mcData.commands);
            const filteredCmds = allCmdKeys.filter(key => {
                const cmdData = mcData.commands[key];
                const description = cmdData.description || "";
                // 同时匹配英文指令名和中文描述
                return key.toLowerCase().includes(inputCmd) ||
                    description.toLowerCase().includes(inputCmd);
            });

            let cmdConfig = mcData.commands[inputCmd];
            if (cmdConfig && cmdConfig.alias) cmdConfig = mcData.commands[cmdConfig.alias];

            // 如果还没输入完指令名，直接显示指令建议
            if (!cmdConfig || (parts.length === 1 && !raw.endsWith(' '))) {
                statusArea.style.display = 'none';
                renderSuggestions(filteredCmds, true);
                return;
            }

            cardLabel.innerText = "语法引导";
            statusArea.style.display = 'block';

            const patterns = cmdConfig.patterns || {};
            const patternKeys = Object.keys(patterns);

            // 1. 计算当前参数的逻辑索引（处理 position 占 3 位的情况）
            // 我们取第一个模式作为基准来计算索引位置，因为 Minecraft 指令参数位置通常是对齐的
            const baseParams = patterns[patternKeys[0]].params;
            const activeIdx = calculateActiveIndex(args, baseParams, endsWithSpace);

            // 2. 收集所有模式在当前索引位置的可能参数
            let possibleParamsAtCursor = [];
            patternKeys.forEach(key => {
                const p = patterns[key];
                const param = p.params[activeIdx];
                if (param) {
                    // 根据参数名去重，避免显示重复的 <目的地实体>
                    if (!possibleParamsAtCursor.find(x => x.name === param.name)) {
                        possibleParamsAtCursor.push(param);
                    }
                }
            });

            patternKeys.forEach(key => {
                const p = patterns[key];

                // 为每个模式独立计算其当前的逻辑索引位置
                const activeIdxForThisPattern = calculateActiveIndex(args, p.params, endsWithSpace);

                // 只有当该模式与当前输入匹配时（不返回 -1），才收集其参数建议
                if (activeIdxForThisPattern !== -1) {
                    const param = p.params[activeIdxForThisPattern];
                    if (param) {
                        // --- 新增：如果是子命令位，自动把所有 execute 的子模式关键字加入建议 ---
                        if (param.type === "subcommand" || param.name === "子命令") {
                            // 这里假设你想要列出所有的 execute 分支关键字
                            patternKeys.forEach(k => {
                                const firstParam = patterns[k].params[0];
                                if (firstParam && firstParam.type === "plain") {
                                    if (!possibleParamsAtCursor.find(x => x.name === firstParam.name)) {
                                        possibleParamsAtCursor.push(firstParam);
                                    }
                                }
                            });
                        } else {
                            if (!possibleParamsAtCursor.find(x => x.name === param.name)) {
                                possibleParamsAtCursor.push(param);
                            }
                        }
                    }
                }
            });
            // --- 3. 构建多行语法引导 ---
            let syntaxHtml = "";

            // 遍历所有模式进行渲染
            patternKeys.forEach(key => {
                const p = patterns[key];

                // 【修改】为每个模式独立计算索引，确保类型匹配
                const activeIdxForThisPattern = calculateActiveIndex(args, p.params, endsWithSpace);

                // 如果返回 -1，说明输入的内容与此模式类型冲突，直接不渲染该行
                if (activeIdxForThisPattern === -1) return;

                let rowContent = `<div class="syntax-row active">`;
                rowContent += `<span class="cmd-name">/${inputCmd}</span> `;

                p.params.forEach((param, i) => {
                    let displayValue = "";
                    if (param.type === "position") {
                        displayValue = "x y z";
                    } else if (param.type === "plain") {
                        displayValue = param.name || param.prompt;
                    } else {
                        displayValue = param.optional ? `[${param.name}]` : `<${param.name}>`;
                    }

                    // 高亮逻辑
                    if (i === activeIdxForThisPattern) {
                        rowContent += `<span class="syntax-active">${displayValue}</span> `;
                        // 收集当前位置建议
                        if (!possibleParamsAtCursor.find(x => x.name === param.name)) {
                            possibleParamsAtCursor.push(param);
                        }
                    } else {
                        rowContent += `<span class="param-hint">${displayValue}</span> `;
                    }
                });

                rowContent += `</div>`;
                syntaxHtml += rowContent;
            });

            // 如果没有任何模式匹配，显示错误提示
            if (syntaxHtml === "") {
                syntaxBox.innerHTML = `<span style="color:var(--md-sys-color-error)">语法不匹配：请检查输入参数类型</span>`;
            } else {
                syntaxBox.innerHTML = syntaxHtml;
            }

            // 4. 渲染汇总后的建议
            renderMultipleParamSuggestions(possibleParamsAtCursor, currentArgText);
        });

        function calculateActiveIndex(args, params, endsWithSpace) {
            let argPtr = 0; // 指向 args 数组（用户输入的分词）

            for (let i = 0; i < params.length; i++) {
                const paramConfig = params[i];

                // 如果当前输入指针已经超出了用户输入的单词量
                if (argPtr >= args.length) return i;

                if (paramConfig.type === "subcommand" || paramConfig.name === "子命令") {
                    // 如果用户已经输入了内容（例如输入了 'at'）
                    if (argPtr < args.length) {
                        const subCommandName = args[argPtr];
                        // 此时应该去 mcData.commands 找这个新的子命令分支
                        // 但为了保持 UI 简洁，我们返回当前索引 i，标记为正在输入子命令
                        return i;
                    }
                    return i;
                }
                if (argPtr >= args.length) return i;

                const currentArg = args[argPtr];

                if (paramConfig.type === "position") {
                    // --- 坐标逻辑修正开始 ---
                    // 坐标占用 3 个位置。我们需要判断用户当前填到了第几个。
                    // 剩余未处理的参数数量
                    const remainingArgs = args.length - argPtr;

                    // 如果用户还没输完 3 个坐标位，或者输完了 3 个但没按空格（表示还在写 z）
                    if (remainingArgs < 3 || (remainingArgs === 3 && !endsWithSpace)) {
                        // 检查已输入的部分是否符合坐标格式（简单正则）
                        const currentChunk = args[argPtr];
                        if (currentChunk !== "" && !/^[~^0-9.-]/.test(currentChunk)) {
                            return -1; // 类型不匹配，排除此模式
                        }
                        return i; // 依然判定为当前 position 参数位
                    }

                    // 如果已经输满了 3 位且有后续空格，指针跳过这 3 位
                    argPtr += 3;
                    // --- 坐标逻辑修正结束 ---
                } else {
                    // 普通参数逻辑
                    const currentArg = args[argPtr];
                    if (currentArg !== "") {
                        if (paramConfig.type === "plain") {
                            const argValue = currentArg.toLowerCase();
                            const paramValue = (paramConfig.name || "").toLowerCase();

                            // --- 核心修正：允许前缀匹配 ---
                            // 如果是正在输入的最后一位（还没敲空格），使用 startsWith 允许模糊匹配
                            // 如果已经敲了空格（开始输入下一位了），则要求必须完全相等
                            if (!endsWithSpace && argPtr === args.length - 1) {
                                if (!paramValue.startsWith(argValue)) return -1;
                            } else {
                                if (argValue !== paramValue) return -1;
                            }
                        }

                        // 2. 原有的坐标检查
                        if (paramConfig.type === "position") {
                            if (!/^[~^0-9.-]/.test(currentArg)) return -1;
                        }

                        // 3. 原有的选择器检查
                        else if (paramConfig.type === "selector") {
                            if (/^[~^0-9.-]/.test(currentArg)) return -1;
                        }
                    }
                    argPtr += 1;

                    // 如果还没输入空格，且当前单词就是这一位
                    if (!endsWithSpace && argPtr >= args.length) return i;
                }
            }
            return -1;
        }

        // 修改后的核心函数：同时处理多个参数定义的建议
        // 增加 filterText 参数
        // 修改后的核心函数：整合 a.html 的数据检索逻辑，支持 idlist 和物品显示
        function renderMultipleParamSuggestions(params, filterText = "") {
            if (!params || params.length === 0) return renderSuggestions([], false);

            let allSuggestions = [];

            params.forEach(param => {
                let suggestions = [];

                // 1. 优先级最高：从 enums 或 suggestion/list 指定的键值对中获取
                const listKey = param.list || param.enum || param.suggestion;

                if (listKey) {
                    // 1. 检查 enums 库 (如：difficulty, gamemode, effect)

                    if (mcData.enums && mcData.enums[listKey]) {
                        const enumData = mcData.enums[listKey];
                        if (!Array.isArray(enumData)) {
                            suggestions.push(...Object.entries(enumData).map(([k, v]) => ({
                                text: k,
                                desc: v,
                                listType: listKey // <-- 核心：在这里加上 listType
                            })));
                        } else {
                            suggestions.push(...enumData.map(item =>
                                typeof item === 'string'
                                    ? { text: item, desc: "", listType: listKey } // <-- 核心：字符串也转成带 type 的对象
                                    : { ...item, listType: listKey }              // <-- 核心：已经是对象的直接展开并加上 type


                            ));
                        }
                    }
                    // 如果 listKey 是 sound，直接从音效定义文件中提取键名
                    else if (listKey === 'sound' && typeof soundData !== 'undefined') {
                        const soundKeys = Object.keys(soundData);
                        suggestions.push(...soundKeys.map(name => ({
                            text: name,
                            // 尝试获取 subtitle 作为描述，如果没有则显示“音效”
                            desc: soundData[name].subtitle || "音效 ID",
                            listType: 'sound' // <-- 关键标记
                        })));
                    }

                    // 2. 检查 idlist 库 (如：item, block)
                    else if (mcData.idlist) {
                        const target = mcData.idlist.find(i => i.list === listKey);
                        if (target) {
                            const data = target.data || target.list;
                            if (Array.isArray(data)) {
                                suggestions.push(...data.map(item => ({
                                    text: item,
                                    desc: "ID",
                                    listType: listKey // <-- 核心：在这里加上 listType
                                })));
                            } else if (typeof data === 'object') {
                                suggestions.push(...Object.entries(data).map(([k, v]) => ({
                                    text: k,
                                    desc: v,
                                    listType: listKey // <-- 核心：在这里加上 listType
                                })));
                            }
                        }
                    }
                }

                // 2. 基础类型默认建议 (当 listKey 无效或不存在时)
                if (suggestions.length === 0) {
                    if (param.type === "plain") {
                        // 修改点：增加对 param.prompt 的引用
                        suggestions.push({
                            text: param.name,
                            desc: param.prompt || "关键字"
                        });
                    } else if (param.type === "selector") {
                        // ... 选择器逻辑保持不变
                        suggestions.push(
                            { text: "@a", desc: "所有玩家" },
                            { text: "@e", desc: "所有实体" },
                            { text: "@p", desc: "最近的玩家" },
                            { text: "@r", desc: "随机玩家" },
                            { text: "@s", desc: "当前实体" }
                        );
                    } else if (param.type === "position") {
                        suggestions.push({ text: "~ ~ ~", desc: "当前坐标" });
                    } else if (param.type === "bool" || param.type === "boolean") {
                        suggestions.push({ text: "true", desc: "真" }, { text: "false", desc: "假" });
                    }
                }

                allSuggestions.push(...suggestions);
            });

            // 过滤逻辑
            const normalizedFilter = filterText.trim().toLowerCase();
            // 找到这行：const filtered = allSuggestions.filter(item => { ... });

            const filtered = allSuggestions.filter(item => {
                if (!normalizedFilter) return true;

                // 提取英文 ID
                const text = (typeof item === 'object' ? item.text : item).toLowerCase();
                // 提取中文描述 (desc)
                const desc = (typeof item === 'object' ? (item.desc || "") : "").toLowerCase();

                // 如果英文 ID 包含关键词，或者中文描述包含关键词，则返回 true
                return text.includes(normalizedFilter) || desc.includes(normalizedFilter);
            });

            // 去重
            const uniqueSuggestions = [];
            const map = new Map();
            for (const item of filtered) {
                const text = typeof item === 'object' ? item.text : item;
                if (!map.has(text)) {
                    map.set(text, true);
                    uniqueSuggestions.push(item);
                }
            }

            renderSuggestions(uniqueSuggestions, false);
        }

        // 修改后的函数，增加 listType 参数
        function renderSuggestions(list, isCommand, listType = null) {
            currentSuggestions = list;
            currentListType = listType; // 记录当前类型，比如 'block' 或 'item'
            currentIsCommand = isCommand; // 记录是否为指令
            selectedIndex = -1;
            updateSuggestionUI();
        }

        function applySuggest(text, isCommand) {
            if (isCommand) {
                input.value = "/" + text + " ";
            } else {
                const currentVal = input.value;
                if (currentVal.endsWith(' ')) {
                    input.value = currentVal + text + " ";
                } else {
                    const parts = currentVal.trimEnd().split(/\s+/);
                    parts[parts.length - 1] = text;
                    input.value = (currentVal.startsWith('/') ? '' : '/') + parts.join(" ") + " ";
                    if (!input.value.startsWith('/')) input.value = '/' + input.value;
                }
            }
            localStorage.setItem('mc_cmd_cache', input.value);
            input.focus();
            input.dispatchEvent(new Event('input'));
        }

        function copyInputContent() {
            if (!input.value) return;
            navigator.clipboard.writeText(input.value).then(() => {
                const icon = document.querySelector('.copy-icon span');
                icon.innerText = 'done';
                setTimeout(() => { icon.innerText = 'content_copy'; }, 1500);
            });
        }

        function playSound(path, event) {
            if (event) event.stopPropagation(); // 阻止冒泡，防止点击按钮时自动输入指令

            const audio = new Audio(path);
            audio.volume = 0.5; // 设置初始音量
            audio.play().catch(err => {
                console.error("音频播放失败，请检查路径:", path, err);
            });
        }
        loadData();

    </script>
